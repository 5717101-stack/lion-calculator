steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/second-brain-eu/lion-calculator:$SHORT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/second-brain-eu/lion-calculator:$SHORT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', 'lion-calculator', '--image', 'europe-west1-docker.pkg.dev/$PROJECT_ID/second-brain-eu/lion-calculator:$SHORT_SHA', '--region', 'europe-west1', '--platform', 'managed', '--cpu=1', '--memory=256Mi', '--min-instances=0', '--max-instances=2', '--port=8080', '--allow-unauthenticated']
options:
  logging: CLOUD_LOGGING_ONLY
timeout: '600s'
